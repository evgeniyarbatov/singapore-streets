version: 1

primary_categories:
  - id: colonial_british
    name: Colonial & British
    description: >
      Names from the British colonial era — officials, institutions, British
      places, military figures, and royal references.
    examples:
      - Stamford Road
      - Raffles Avenue
      - Admiralty Road
      - Allenby Road

  - id: malay_archipelago
    name: Malay & Archipelago
    description: >
      Indigenous Malay and regional place-words — Jalan, Lorong, Kampong,
      and names rooted in the Malay/Indonesian archipelago.
    examples:
      - Jalan Besar
      - Lorong Halus
      - Kampong Bahru
      - Pasir Panjang Road

  - id: chinese_dialect_clan
    name: Chinese Dialect & Clan
    description: >
      Teochew, Hokkien, Cantonese, and other Chinese dialect transliterations;
      often linked to markets, temples, or clan associations.
    examples:
      - Teochew Avenue
      - Hokkien Street
      - Amoy Street
      - Club Street

  - id: tamil_south_asian
    name: Tamil & South Asian
    description: >
      Tamil, Hindi, and broader South Asian heritage names, including Hindu
      and Muslim community links.
    examples:
      - Serangoon Road
      - Race Course Road
      - Buffalo Road
      - Veerasamy Road

  - id: nature_geography
    name: Nature & Geography
    description: >
      Hills, rivers, flora, fauna, water bodies, and descriptive geographic
      features — Bukit, Sungei, Mount, Bay, and botanical names.
    examples:
      - Mount Pleasant
      - Sungei Kadut
      - Bukit Timah Road
      - Bayfront Avenue

  - id: trade_industry
    name: Trade & Industry
    description: >
      Occupations, goods, markets, and economic activity — trade streets,
      industrial estates, and commercial naming.
    examples:
      - Market Street
      - Timberland Avenue
      - Fishery Port Road
      - TradeHub

  - id: institutions_public
    name: Institutions & Public
    description: >
      Schools, hospitals, civic buildings, airports, and other public
      infrastructure naming.
    examples:
      - Hospital Drive
      - School Road
      - Airport Boulevard
      - Parliament Place

  - id: housing_development
    name: Housing & Development
    description: >
      Names from HDB new towns, private estates, and planned developments
      from the 1960s onward.
    examples:
      - Compassvale Walk
      - Punggol Field
      - Sengkang East Way
      - Tampines Street

  - id: commemorative_persons
    name: Commemorative & Persons
    description: >
      Streets named after people — local or foreign politicians,
      philanthropists, pioneers, and historical figures.
    examples:
      - Adam Road
      - Albert Winsemius Lane
      - Eu Tong Sen Street
      - Lim Chu Kang Road

  - id: abstract_modern
    name: Abstract & Modern
    description: >
      Developer-era poetic or abstract names — compass points, virtues,
      seasons, colours, and aspirational branding.
    examples:
      - Spring Avenue
      - Vision Drive
      - Amber Road
      - Sunrise Terrace

  - id: numeric_functional
    name: Numeric & Functional
    description: >
      Numbered streets and functional identifiers — Lorong 1, Street 11,
      Avenue 3, and similar systematic naming.
    examples:
      - Lorong 1 Geylang
      - Ang Mo Kio Avenue 1
      - Bedok North Street 1

  - id: uncategorized
    name: Uncategorized
    description: >
      Streets not yet classified or with insufficient evidence; honest
      bucket that should shrink over time.
    examples: []

secondary_tags:
  - id: person
    description: Named after a specific individual
  - id: tree
    description: Named after a tree or plant species
  - id: sea
    description: Coastal, marine, or harbour reference
  - id: estate
    description: Part of a named housing estate or new town
  - id: extinct_place
    description: References a place or kampung that no longer exists
  - id: running_route
    description: Personal tag — good running route
  - id: military
    description: Military or naval reference
  - id: market
    description: Market or trading place reference
  - id: temple
    description: Religious or temple association
  - id: clan
    description: Clan or community association

# Rule-based classification (applied before LLM). First match wins.
rules:
  - category: numeric_functional
    tags: [estate]
    patterns:
      - "^Lorong \\d"
      - "\\bAvenue \\d+$"
      - "\\bStreet \\d+$"
      - "\\bDrive \\d+$"
      - "\\bWalk \\d+$"
      - "\\bCrescent \\d+$"
      - "\\bLane \\d+$"

  - category: malay_archipelago
    patterns:
      - "^Jalan\\b"
      - "^Lorong\\b"
      - "\\bKampong\\b"
      - "\\bKampung\\b"
      - "\\bPasir\\b"
      - "\\bPulau\\b"
      - "\\bTanjong\\b"
      - "\\bTelok\\b"

  - category: nature_geography
    tags: [tree]
    patterns:
      - "\\bBukit\\b"
      - "\\bSungei\\b"
      - "\\bMount\\b"
      - "\\bBay\\b"
      - "\\bHill\\b"
